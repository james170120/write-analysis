<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保險分析報告書編輯器</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h2>報告書輸入區</h2>
            <form id="pdfForm">
                <div class="form-group">
                    <label for="applicantName">要保人姓名：</label>
                    <input type="text" id="applicantName" placeholder="請輸入姓名">
                </div>
                <div class="form-group">
                    <label for="insuranceCompany">保險公司名稱：</label>
                    <input type="text" id="insuranceCompany" placeholder="請輸入公司名稱">
                </div>
                </form>
            <button id="downloadBtn">下載 PDF 報告書</button>
        </div>

        <div class="right-panel">
            <iframe id="pdfPreview" src=""></iframe>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
